<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PuppetPals</title>
  <link rel="stylesheet" href="css/main.css">
  <link rel="stylesheet" href="css/editor.css">
  <!-- Three.js import map for ES module imports -->
  <script type="importmap">
  {
    "imports": {
      "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
      "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
    }
  }
  </script>
</head>
<body>
  <!-- Join Screen -->
  <div id="join-screen">
    <div class="join-content">
      <h1 class="join-title">PuppetPals</h1>
      <p class="join-subtitle">Enter your nickname to join the stage</p>
      <form id="join-form" class="join-form">
        <div class="form-group">
          <label for="server-address">Server Address</label>
          <input type="text" id="server-address" placeholder="http://localhost:3000" value="http://localhost:3000" />
        </div>
        <div class="form-group">
          <label for="nickname">Nickname</label>
          <input type="text" id="nickname" placeholder="Enter your nickname (3-20 chars)" minlength="3" maxlength="20" required autocomplete="off" />
        </div>
        <div id="join-error" class="error-message hidden"></div>
        <button type="submit" id="connect-btn" class="btn btn-primary">Connect</button>
      </form>
      <div id="join-status" class="join-status hidden"></div>
    </div>
  </div>

  <!-- Game Container (hidden until joined) -->
  <div id="game-container" class="hidden">
    <!-- 3D Stage Container -->
    <div id="stage-container">
      <canvas id="stage-canvas"></canvas>
    </div>

    <!-- Asset Browser Sidebar -->
    <div id="asset-panel" class="sidebar">
      <div class="sidebar-header">
        <h3>Assets</h3>
        <button id="close-asset-panel" class="btn-icon" title="Close Panel">&times;</button>
      </div>
      <div id="asset-browser-container"></div>
    </div>

    <!-- UI Overlays -->
    <div id="ui-overlay">
      <!-- Top Bar -->
      <div id="top-bar">
        <button id="toggle-asset-panel" class="btn btn-small">Assets</button>
        <button id="open-editor-btn" class="btn btn-small" title="Bone Editor">🔧 Bones</button>
        <button id="open-visual-editor-btn" class="btn btn-small" title="Visual Puppet Builder">🎨 Visual Builder</button>
        <span id="player-info" class="player-info"></span>
      </div>
      <!-- Panels will be injected here dynamically -->
    </div>

    <!-- Movement Bar (Request 19) -->
    <div id="movement-bar" class="hidden">
      <button id="move-left-btn" class="movement-btn" title="Move Left">◄ LEFT</button>
      <div id="slot-indicator">
        <span id="slot-label">Slot -</span>
        <span id="slot-position">-</span>
      </div>
      <button id="move-right-btn" class="movement-btn" title="Move Right">RIGHT ►</button>
      <button id="move-on-stage-btn" class="movement-btn hidden" title="Move On-Stage">On-Stage</button>
    </div>

    <!-- Puppet Builder Button moved to top bar -->
  </div>

  <!-- Puppet Editor Overlay (fullscreen modal) -->
  <div id="puppet-editor-overlay" class="puppet-editor-overlay">
    <div class="puppet-editor-container">
      <div class="puppet-editor-header">
        <h2>Puppet Builder</h2>
        <div class="puppet-editor-header-actions">
          <button id="editor-close-btn" class="btn btn-secondary" title="Close Editor">✕</button>
        </div>
      </div>
      <div class="puppet-editor-body">
        <div class="puppet-editor-bone-list">
          <h3>Bones</h3>
          <div id="editor-bone-list"></div>
        </div>
        <div class="puppet-editor-properties" id="editor-properties">
          <div class="puppet-editor-no-selection">Select a bone to edit its properties</div>
        </div>
      </div>
      <div class="puppet-editor-footer">
        <div class="puppet-editor-footer-left">
          <button id="editor-reset-btn" class="btn btn-secondary" title="Reset Changes">Reset</button>
          <button id="editor-sort-y-btn" class="btn btn-secondary" title="Auto-sort Z by Y position">Sort Z by Y</button>
          <span id="editor-changes-indicator" class="changes-indicator saved"><span class="dot"></span> Saved</span>
        </div>
        <div class="puppet-editor-footer-right">
          <button id="editor-export-btn" class="btn btn-secondary" title="Export JSON">Export JSON</button>
          <button id="editor-apply-btn" class="btn btn-primary" title="Apply Changes">Apply</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Visual Editor Overlay (drag-and-drop puppet builder) -->
  <div id="visual-editor-overlay" class="visual-editor-overlay">
    <div class="visual-editor-container">
      <div class="visual-editor-header">
        <h2>Visual Puppet Builder</h2>
        <div class="visual-editor-header-actions">
          <button id="ve-close-btn" class="btn btn-secondary" title="Close Builder">✕</button>
        </div>
      </div>
      <div class="visual-editor-body" id="visual-editor-container"></div>
    </div>
  </div>

  <!-- Client scripts -->
  <script type="module" src="js/main.js"></script>
</body>
</html>
